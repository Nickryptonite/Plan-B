services:
  - type: web
    name: sidequest-api
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URL
        sync: false
      - key: DB_NAME
        value: sidequest
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: APP_BASE_URL
        sync: false
